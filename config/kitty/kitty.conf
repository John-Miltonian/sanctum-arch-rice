# Sanctum OS - Kitty Terminal Configuration
# Dark theme with transparency and Christian liturgical colors

# Font configuration
font_family      Fira Code
bold_font        Fira Code Bold
italic_font      Fira Code Italic
font_size        12.0

# Transparency
background_opacity 0.92
dynamic_background_opacity yes

# Window styling
window_padding_width 8
window_margin_width 4
hide_window_decorations no
cursor_blink_interval 0.5
scrollback_lines 10000
enable_audio_bell no
visual_bell_duration 0.0

# Tab bar styling
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_edge top
tab_bar_margin_width 4
tab_bar_min_tabs 2
active_tab_foreground   #c9a227
active_tab_background   #1a1a20
active_tab_font_style   bold
inactive_tab_foreground #7a7066
inactive_tab_background #252530
inactive_tab_font_style normal
tab_title_template {index}: {title}

# Color scheme - Dark with gold accents (Ordinary Time)
foreground #d8cfc4
background #15151a

# Black
color0  #252530
color8  #3a3a45

# Red (Pentecost/Martyrs)
color1  #c45c5c
color9  #e07a7a

# Green (Ordinary Time)
color2  #5c8c5c
color10 #7aad7a

# Yellow/Gold (Major Feasts)
color3  #c9a227
color11 #e6c45c

# Blue (Marian Feasts)
color4  #5c7ca0
color12 #7aa0c4

# Magenta/Purple (Advent/Lent)
color5  #8c5c8c
color13 #b07ab0

# Cyan
color6  #5c8c9c
color14 #7aadbd

# White
color7  #a89984
color15 #d8cfc4

# Selection colors
selection_foreground #15151a
selection_background #c9a227

# Cursor
cursor #c9a227
cursor_text_color #15151a

# URL styling
url_color #7aadbd
url_style curly

# Mouse
mouse_hide_wait 3.0
focus_follows_mouse yes

# Performance
repaint_delay 10
input_delay 3
sync_to_monitor yes

# Scrollback
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
scrollback_pager_history_size 0

# Unicode
unicode_version 15.0

# Shell integration
shell_integration enabled

# Background image (optional - set path to your preferred religious artwork)
# background_image /home/josh/.config/wallpapers/terminal-bg.jpg
# background_image_layout scaled
# background_image_linear yes
# background_tint 0.9

# Bell styling (cross appears on bell)
visual_bell_color #c9a227

# Window borders
window_border_width 1
active_border_color #c9a227
inactive_border_color #3a3a45

# Performance for transparency
background_tint 0.95
dim_opacity 0.75

# Cursor trail effect for aesthetic
cursor_trail 0

# Confirm close
confirm_os_window_close 0

# Startup session
startup_session session.conf
